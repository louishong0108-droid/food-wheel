<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>今天吃什麼 🎡</title>

<style>
body {
    text-align: center;
    font-family: sans-serif;
    background: #f5f5f5;
}

#wrapper {
    position: relative;
    width: 320px;
    margin: 30px auto;
}

#wheel {
    width: 320px;
    height: 320px;
    border-radius: 50%;
    border: 8px solid #333;
    position: relative;
    overflow: hidden;
    transition: transform 3s ease-out;
}

.slice {
    position: absolute;
    width: 50%;
    height: 50%;
    transform-origin: 100% 100%;
    background: #87CEFA;
    border: 1px solid #fff;
}

#labels {
    position: absolute;
    top: 0;
    left: 0;
    width: 320px;
    height: 320px;
    pointer-events: none;
}

.label {
    position: absolute;
    left: 50%;
    top: 50%;
    transform-origin: center;
    font-size: 12px;
    white-space: nowrap;
}

button {
    padding: 12px 20px;
    font-size: 16px;
    margin: 10px;
    border-radius: 10px;
    border: none;
    background: #333;
    color: white;
}

#result {
    margin-top: 20px;
    font-size: 20px;
}
</style>
</head>

<body>

<h1>🎡 今天吃什麼</h1>

<button onclick="start()">📍 抓位置</button>
<button onclick="spin()" id="spinBtn" disabled>🎯 開轉</button>

<div id="wrapper">
    <div id="wheel"></div>
    <div id="labels"></div>
</div>

<div id="result"></div>

<script>
let restaurants = [];
let angle = 0;

function start() {
    navigator.geolocation.getCurrentPosition(pos => {
        fetch('/restaurants', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                lat: pos.coords.latitude,
                lon: pos.coords.longitude,
                radius: 500
            })
        })
        .then(res => res.json())
        .then(data => {
            restaurants = data.slice(0, 8);
            drawWheel();
            document.getElementById("spinBtn").disabled = false;
        });
    }, () => {
        alert("請允許定位！");
    });
}

function drawWheel() {
    const wheel = document.getElementById("wheel");
    const labels = document.getElementById("labels");

    wheel.innerHTML = "";
    labels.innerHTML = "";

    let sliceAngle = 360 / restaurants.length;

    restaurants.forEach((r, i) => {
        // 畫區塊
        let div = document.createElement("div");
        div.className = "slice";
        div.style.transform =
            `rotate(${i * sliceAngle}deg) skewY(${90 - sliceAngle}deg)`;
        wheel.appendChild(div);

        // 畫文字（獨立層）
        let label = document.createElement("div");
        label.className = "label";
        label.style.transform =
            `rotate(${i * sliceAngle + sliceAngle / 2}deg) translate(0, -120px) rotate(90deg)`;
        label.innerText = r.name;

        labels.appendChild(label);
    });
}

function spin() {
    let spinAngle = Math.random() * 360 + 720;
    angle += spinAngle;

    let wheel = document.getElementById("wheel");
    wheel.style.transform = `rotate(${angle}deg)`;

    setTimeout(() => {
        let index = Math.floor(((360 - (angle % 360)) / 360) * restaurants.length);
        let chosen = restaurants[index];

        document.getElementById("result").innerHTML =
            `🎯 今天吃：${chosen.name}<br>
            <a href="https://www.google.com/maps?q=${chosen.lat},${chosen.lon}" target="_blank">📍 導航</a>`;
    }, 3000);
}
</script>

</body>
</html>
