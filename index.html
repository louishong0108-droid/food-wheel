<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>今天吃什麼 🍜</title>

<style>
body {
    text-align: center;
    font-family: sans-serif;
    background: #f5f5f5;
}

h1 {
    margin-top: 40px;
}

button {
    padding: 15px 25px;
    font-size: 18px;
    margin: 10px;
    border-radius: 12px;
    border: none;
    background: #333;
    color: white;
}

#result {
    margin-top: 40px;
    font-size: 24px;
    font-weight: bold;
}

a {
    display: inline-block;
    margin-top: 10px;
    font-size: 18px;
}
</style>
</head>

<body>

<h1>🍜 今天吃什麼</h1>

<button onclick="getLocation()">📍 取得位置</button>
<button onclick="pickFood()" id="pickBtn" disabled>🎲 隨機抽一間</button>

<div id="result"></div>

<script>
let restaurants = [];

function getLocation() {
    navigator.geolocation.getCurrentPosition(pos => {
        fetch('/restaurants', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                lat: pos.coords.latitude,
                lon: pos.coords.longitude,
                radius: 500
            })
        })
        .then(res => res.json())
        .then(data => {
            restaurants = data;
            document.getElementById("pickBtn").disabled = false;
            alert("已抓到 " + restaurants.length + " 間餐廳！");
        });
    }, () => {
        alert("請允許定位！");
    });
}

function pickFood() {
    if (restaurants.length === 0) return;

    let randomIndex = Math.floor(Math.random() * restaurants.length);
    let chosen = restaurants[randomIndex];

    document.getElementById("result").innerHTML = `
        🎯 今天吃：${chosen.name}<br>
        <a href="https://www.google.com/maps?q=${chosen.lat},${chosen.lon}" target="_blank">📍 點我導航</a>
    `;
}
</script>

</body>
</html>
