<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>今天吃什麼 🎡</title>

<style>
body {
    text-align: center;
    font-family: sans-serif;
    background: #f5f5f5;
}
#wheel {
    margin: 30px auto;
    width: 320px;
    height: 320px;
    border-radius: 50%;
    border: 8px solid #333;
    position: relative;
    overflow: hidden;
    transition: transform 3s ease-out;
}
.slice {
    position: absolute;
    width: 50%;
    height: 50%;
    transform-origin: 100% 100%;
    background: #87CEFA;
    border: 1px solid #fff;
}
button {
    padding: 12px 20px;
    font-size: 16px;
    margin: 10px;
    border-radius: 10px;
    border: none;
    background: #333;
    color: white;
}
#result {
    margin-top: 20px;
    font-size: 20px;
}
</style>
</head>

<body>

<h1>🎡 今天吃什麼</h1>

<button onclick="start()">📍 抓位置</button>
<button onclick="spin()" id="spinBtn" disabled>🎯 開轉</button>

<div style="position:relative; width:320px; margin:auto;">
    <div id="wheel"></div>
    <div id="labels"></div>
</div>
<div id="result"></div>

<script>
let restaurants = [];
let angle = 0;

function start() {
    navigator.geolocation.getCurrentPosition(pos => {
        fetch('/restaurants', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                lat: pos.coords.latitude,
                lon: pos.coords.longitude,
                radius: 500
            })
        })
        .then(res => res.json())
        .then(data => {
            restaurants = data.slice(0, 8);
            drawWheel();
            document.getElementById("spinBtn").disabled = false;
        });
    }, () => {
        alert("請允許定位！");
    });
}

function drawWheel() {
    const wheel = document.getElementById("wheel");
    wheel.innerHTML = "";
    let sliceAngle = 360 / restaurants.length;

    restaurants.forEach((r, i) => {
        let div = document.createElement("div");
        div.className = "slice";
        div.style.transform =
            `rotate(${i * sliceAngle}deg) skewY(${90 - sliceAngle}deg)`;
        div.innerHTML =
`<span style="
position:absolute;
left:50%;
top:50%;
transform: rotate(${sliceAngle/2}deg) translate(-50%, -50%);
transform-origin: center;
font-size:12px;
white-space:nowrap;
">
${r.name}
</span>`;
        wheel.appendChild(div);
    });
}

function spin() {
    let spinAngle = Math.random() * 360 + 720;
    angle += spinAngle;

    let wheel = document.getElementById("wheel");
    wheel.style.transform = `rotate(${angle}deg)`;

    setTimeout(() => {
        let index = Math.floor(((360 - (angle % 360)) / 360) * restaurants.length);
        let chosen = restaurants[index];

        document.getElementById("result").innerHTML =
            `🎯 今天吃：${chosen.name}<br>
            <a href="https://www.google.com/maps?q=${chosen.lat},${chosen.lon}" target="_blank">📍 導航</a>`;
    }, 3000);
}
</script>

</body>
</html>
